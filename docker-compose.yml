# Infraestrutura local — PostgreSQL e Redis foram migrados para o Supabase.
# Este arquivo mantém apenas o PgAdmin como ferramenta opcional de visualização.
#
# Para conectar o PgAdmin ao Supabase:
#   Host: db.pvfjsdglfnvalmhunjpi.supabase.co  |  Port: 5432
#   User: postgres  |  Database: postgres
#
# Subir PgAdmin:
#   docker compose --profile tools up -d

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tea_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: joelson@coracaofeliz.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    profiles:
      - tools    # Só sobe com: docker compose --profile tools up
